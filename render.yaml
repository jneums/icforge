# ICForge Render.com deployment
# Deploy with: render blueprint apply

services:
  # Backend API (Rust)
  - type: web
    name: icforge-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: icforge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false  # Set manually
      - key: GITHUB_CLIENT_SECRET
        sync: false  # Set manually
      - key: GITHUB_APP_ID
        sync: false  # Set manually — GitHub App ID
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false  # Set manually — GitHub App private key PEM
      - key: GITHUB_WEBHOOK_SECRET
        sync: false  # Set manually — GitHub webhook secret
      - key: IC_IDENTITY_PEM
        sync: false  # Set manually — platform identity PEM (SEC1 EC format)
      - key: IC_NETWORK
        value: "mainnet"
      - key: FRONTEND_URL
        value: "https://icforge-dashboard.onrender.com"

  # Dashboard (React/Vite static site)
  - type: web
    name: icforge-dashboard
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: ./dashboard/dist
    rootDir: .
    envVars:
      - key: VITE_API_URL
        value: "https://icforge-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: icforge-db
    plan: free
    region: oregon
